<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>邮件全文翻译</title>
  <link rel="stylesheet" href="full_translation.css">
</head>
<body>
  <div class="container">
    <header class="header">
      <h1>全文翻译对照</h1>
      <div class="header-actions">
        <button id="copyBtn" class="btn btn-primary" style="display:none">📋 复制译文</button>
      </div>
    </header>

    <div id="loading" class="state-container">
      <div class="spinner"></div>
      <p id="loadingText">正在获取并翻译邮件内容，请稍候...</p>
    </div>

    <div id="error" class="state-container hidden">
      <div class="error-icon">⚠️</div>
      <p id="errorText">翻译发生错误，请重试。</p>
    </div>

    <div id="content" class="content-container hidden">
      <div class="panel">
        <div class="panel-header">译文 (中文)</div>
        <div id="translatedOutput" class="panel-body translated"></div>
      </div>
      <div class="panel">
        <div class="panel-header">原文</div>
        <div id="originalOutput" class="panel-body original"></div>
      </div>
    </div>
  </div>

  <script src="full_translation.js"></script>
</body>
</html>
