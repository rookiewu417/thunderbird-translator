<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>翻译助手 - 设置</title>
  <link rel="stylesheet" href="options.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <img src="icons/icon-48.svg" class="logo" alt="logo">
      <h1 class="title">翻译助手设置</h1>
    </div>

    <!-- 翻译引擎选择 -->
    <section class="card">
      <h2 class="card-title">🌐 翻译引擎</h2>
      <div class="form-group">
        <label for="engine">当前引擎</label>
        <select id="engine">
          <option value="baidu">百度翻译</option>
          <option value="deepl" disabled>DeepL（即将支持）</option>
          <option value="google" disabled>Google 翻译（即将支持）</option>
        </select>
      </div>
    </section>

    <!-- API 凭据 -->
    <section class="card" id="baiduConfig">
      <h2 class="card-title">🔑 百度翻译 API 配置</h2>
      <p class="card-desc">
        请前往 <a href="https://fanyi-api.baidu.com/" target="_blank">百度翻译开放平台</a> 申请 AppID 和密钥（免费额度：每月 100 万字符）
      </p>
      <div class="form-group">
        <label for="appid">AppID</label>
        <input type="text" id="appid" placeholder="请输入百度翻译 AppID" autocomplete="off">
      </div>
      <div class="form-group">
        <label for="key">密钥（Secret Key）</label>
        <input type="password" id="key" placeholder="请输入百度翻译密钥" autocomplete="off">
        <button type="button" class="toggle-pwd" id="toggleKey" title="显示/隐藏密钥">👁</button>
      </div>
    </section>


    <!-- 操作按钮 -->
    <div class="actions">
      <button class="btn-primary" id="saveBtn">💾 保存设置</button>
      <button class="btn-secondary" id="testBtn">🔗 测试连接</button>
      <button class="btn-ghost" id="resetBtn">重置</button>
    </div>

    <!-- 状态提示 -->
    <div class="status hidden" id="statusBar">
      <span class="status-icon" id="statusIcon"></span>
      <span class="status-msg" id="statusMsg"></span>
    </div>
  </div>

  <script src="options.js"></script>
</body>
</html>
